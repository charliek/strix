name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain (from rust-toolchain.toml)
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --all

      - name: Build (release)
        run: cargo build --release

  # Single required status check the release flow gates on (release.yml's
  # ci-gate polls this, and main's branch ruleset requires it). Keeping it a
  # separate aggregator job means the required check name stays stable even if
  # build-test later fans out into a matrix.
  ci-success:
    needs: [build-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Require build-test to have passed
        run: |
          if [ "${{ needs.build-test.result }}" != "success" ]; then
            echo "::error::build-test concluded '${{ needs.build-test.result }}'"
            exit 1
          fi
